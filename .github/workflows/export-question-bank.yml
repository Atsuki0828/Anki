name: Export and compare question bank

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node export-question-bank.mjs
      - run: node generate-heavy2024-authority.mjs
      - run: node compare-heavy2024.mjs
      - name: Commit generated verification data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add question-bank-export.json heavy2024-authoritative.json heavy2024-match-report.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "資料準拠修正: 重問2024との差分を更新"
          git push
