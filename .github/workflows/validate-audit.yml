name: Validate audit
on: [push]
permissions:
  contents: write
jobs:
  test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: node validate-medical-audit-safe.mjs
      - run: |
          git config user.name audit-bot
          git config user.email audit@example.com
          git add medical-audit-validation-v2.json
          git commit -m audit-validation || true
          git push
