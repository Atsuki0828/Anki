name: Apply second medical audit

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Connect audit files
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          question_files = sorted(path.name for path in Path('.').glob('questions-corrections-medical-audit-2-*.js'))
          terminology_files = sorted(path.name for path in Path('.').glob('terminology-corrections-medical-audit-2-*.js'))
          index = Path('index.html')
          text = index.read_text()
          for name in question_files:
              tag = f'<script src="{name}"></script>'
              if tag not in text:
                  text = text.replace('<script src="terminology-upper.js"></script>', tag + '\n<script src="terminology-upper.js"></script>')
          for name in terminology_files:
              tag = f'<script src="{name}"></script>'
              if tag not in text:
                  text = text.replace('<script src="taxonomy.js"></script>', tag + '\n<script src="taxonomy.js"></script>')
          index.write_text(text)
          sw = Path('sw.js')
          cache = re.sub(r"const CACHE='[^']+';", "const CACHE='anatomy-quiz-medical-audit-v22';", sw.read_text())
          for name in question_files + terminology_files:
              token = f"'./{name}'"
              if token not in cache:
                  cache = cache.replace("'./manifest.webmanifest'", token + ",'./manifest.webmanifest'")
          sw.write_text(cache)
          PY
      - name: Validate JavaScript
        run: |
          for f in questions-corrections-medical-audit-2-*.js terminology-corrections-medical-audit-2-*.js; do node --check "$f"; done
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "医学資料精査: 監査ファイルを公開版へ接続"
          git push
