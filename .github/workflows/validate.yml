name: Validate anatomy quiz

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check JavaScript syntax
        run: find . -maxdepth 1 -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Validate 519 English and Latin records
        run: node validate-terminology.mjs
