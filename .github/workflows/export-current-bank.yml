name: Export and validate current question bank

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node export-current-bank.mjs
      - name: Validate terminology and JavaScript
        run: |
          node --check questions-corrections-medical-audit.js
          node --check terminology-corrections-medical-audit.js
          node validate-terminology.mjs | tee medical-audit-validation.txt
      - name: Commit validation output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current-question-bank.tsv medical-audit-validation.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "医学資料照合: 検証結果を更新"
          git push
